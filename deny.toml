[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = [
    # Transitive through Slint's image stack. There is no safe upgrade currently;
    # keep visible in policy so future Slint/image upgrades can remove it.
    "RUSTSEC-2024-0436",
    # Transitive through syntect's bundled syntax/theme loading path.
    # Texti does not expose bincode or yaml-rust as document parsers; revisit
    # when syntect moves to maintained replacements or a newer bundled engine.
    "RUSTSEC-2025-0141",
    "RUSTSEC-2024-0320",
    # quick-xml 0.39 remains transitive through Linux Wayland/D-Bus metadata
    # in the current Slint stack. Texti does not parse opened documents through
    # these paths. Remove both exceptions as soon as upstream accepts 0.41+.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # Current Slint SVG/font dependencies still use ttf-parser. This is an
    # unmaintained notice rather than a known vulnerability; revisit on upgrade.
    "RUSTSEC-2026-0192",
    # rustybuzz remains transitive through Slint's resvg/usvg stack. Texti only
    # renders trusted, bundled SVG assets; remove this exception when Slint's
    # image stack moves to a maintained shaping dependency.
    "RUSTSEC-2026-0206",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "BSL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "GPL-3.0-only",
    "ISC",
    "LicenseRef-Slint-Royalty-free-2.0",
    "LicenseRef-Slint-Software-3.0",
    "MIT",
    "MPL-2.0",
    "NCSA",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
